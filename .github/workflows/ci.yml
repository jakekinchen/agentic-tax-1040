name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:pdf
      - run: pnpm test:e2e
